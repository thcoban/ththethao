# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  workflow_dispatch: # Allows you to run the action manually for testing

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Download python, m3u files
      run: |
        curl -H "Authorization: token ${{ secrets.MY_SECRET_PAT }}" -L -o bunchatv.py https://raw.githubusercontent.com/thcoban/autoupdate/refs/heads/main/python/bunchatv.py  & 
        curl -H "Authorization: token ${{ secrets.MY_SECRET_PAT }}" -L -o thapcam24htv.py https://raw.githubusercontent.com/thcoban/autoupdate/refs/heads/main/python/thapcam24htv.py  & 
        curl -H "Authorization: token ${{ secrets.MY_SECRET_PAT }}" -L -o xoilacztv.py https://raw.githubusercontent.com/thcoban/autoupdate/refs/heads/main/python/xoilacztv.py  & 
        curl -H "Authorization: token ${{ secrets.MY_SECRET_PAT }}" -L -o json2m3u.py https://raw.githubusercontent.com/thcoban/autoupdate/refs/heads/main/python/json2m3u.py &
        curl -L -o bongda.m3u "${{ secrets.URL_BONGDA }}"
        
        wait 
        
        ls -lh
        
    - name: Download, get & convert links to M3U files
      run: |
        if [ -f "xoilacztv.py" ]; then
          python xoilacztv.py https://xoilacz.vip xoilacztv.m3u  & 
        fi
        if [ -f "bunchatv.py" ]; then
          python bunchatv.py https://bit.ly/bunchatv bunchatv.m3u  & 
        fi
        if [ -f "thapcam24htv.py" ]; then
          python thapcam24htv.py https://thapcam24h.net thapcam24htv.m3u  & 
        fi
        if [ -f "json2m3u.py" ]; then
          python json2m3u.py https://tinyurl.com/hoiquantv8 hoiquantv.m3u  1   & 
        fi
        
        #python json2m3u.py https://tinyurl.com/buncha2 bunchatv.m3u  1
        #python json2m3u.py https://tinyurl.com/thapcam2 thapcamfaketv.m3u  1
        #python json2m3u.py https://tinyurl.com/quechoa quechoatv.m3u  1

        wait        
        
