name: Auto merge trigger no.4

# Controls when the workflow will run
on:
  repository_dispatch:
    types: [trigger-football-crawl]   # Lắng nghe tín hiệu từ Cron-job.org
  # schedule:
  #   # Use https://crontab.guru to customize your schedule.
  #   - cron: "54 6-20 * * *"
  
  workflow_dispatch: # Allows you to run the action manually for testing
  
jobs:
  call-child:
    permissions:
      contents: write # Required to push changes back to the repo
      pages: write
      id-token: write
      
    # trigger automerge.yml
    uses: ./.github/workflows/merge-deploy.yml
    secrets: inherit # pass all secrets
